services:
  portfolio-web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '5173:5173'
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./:/app
      - node_modules:/app/node_modules
    command: npm run dev -- --host 0.0.0.0
    stdin_open: true
    tty: true

volumes:
  node_modules:
